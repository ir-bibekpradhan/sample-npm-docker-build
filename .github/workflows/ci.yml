name: SNYK xxxx InvisiRisk
on:
  workflow_dispatch:
permissions:
  checks: write
  contents: write
  packages: read
  actions: write
jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    name: Sync fork and Run build
    steps:
        # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
          api_url: "https://app.dev.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY}}
          mode: docker-intercept
      # ============= InvisiRisk Setup End =============
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Build Docker Image
        run: docker build -t my-app:latest --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:dev-test --secret id=pse-ca,src=/etc/ssl/certs/pse.pem --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 .

 
          # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develop
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============

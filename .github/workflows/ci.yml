name: SNYK xxxx InvisiRisk - Alpine HTTP
on:
  workflow_dispatch:

permissions:
  checks: write
  contents: write
  packages: read
  actions: write

jobs:
  build-alpine-http:
    runs-on: ubuntu-latest
    name: Build Docker Image on Alpine with HTTP Request

    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@develop
        with:
          api_url: "https://app.stage.invisirisk.com"
          app_token: ${{ secrets.IR_API_KEY }}
          mode: docker-intercept
        # Purpose: Set up PSE proxy/certificate interception
      # ============= InvisiRisk Setup End =============

      # Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
        # Purpose: Access Dockerfile and source code

      # ---------------- Build Docker Image ----------------
      - name: Build Docker Image
        run: docker build -t my-app:latest --build-arg BUILDKIT_SYNTAX=public.ecr.aws/w3c0c0n7/invisirisk/baf-buildkit:dev-test --secret id=pse-ca,src=/etc/ssl/certs/pse.pem --build-arg PSE_PROXY=http://${PSE_PROXY_IP}:3128 .
        # Purpose: Build Docker image exactly as in original workflow, now using Alpine base

      # Verify Docker image exists
      - name: Verify Docker Image Exists
        run: docker images | grep my-app
        # Purpose: Confirm build succeeded

      # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@develop
        with:
          cleanup: "true"
        # Purpose: Remove PSE proxy and certificates
      # ============= InvisiRisk Cleanup End =============
